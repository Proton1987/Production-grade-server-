upstream watermark {
    server watermark:3000;
    keepalive 32;
}

# Increase upload size limit to 2GB
client_max_body_size 2048m;
client_body_timeout 600s;
proxy_read_timeout 600s;
proxy_send_timeout 600s;

server {
    listen 80;
    server_name _;  # Change to your domain

    # WebSocket support (Socket.IO)
    location /socket.io/ {
        proxy_pass http://watermark;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Main app
    location / {
        proxy_pass http://watermark;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;  # Stream uploads directly
    }

    # Serve output files directly for faster downloads
    location /outputs/ {
        proxy_pass http://watermark;
        proxy_set_header Host $host;
        add_header Cache-Control "private, no-store";
        add_header X-Content-Type-Options nosniff;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}

