version: '3.8'

services:
  watermark:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - ./temp:/app/temp
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MAX_CONCURRENT=3
    restart: unless-stopped
    mem_limit: 2g
    cpus: '2.0'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Nginx reverse proxy with SSL
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl   # Put your SSL certs here
    depends_on:
      - watermark
    restart: unless-stopped
    profiles:
      - production
